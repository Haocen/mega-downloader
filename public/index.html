<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGA Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mega-red: #d92128; }
        body { 
            background-color: #f0f2f5; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container { display: flex; justify-content: center; width: 100%; padding: 20px; }
        .card { 
            border: none; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 100%; max-width: 550px; background: #fff; padding: 2rem;
        }
        .btn-primary { background-color: var(--mega-red); border-color: var(--mega-red); }
        .btn-primary:hover { background-color: #b01a1f; border-color: #b01a1f; }
        .history-list { max-height: 300px; overflow-y: auto; border-radius: 8px; margin-top: 1rem; }
        .list-group-item { font-size: 0.9rem; border-left: none; border-right: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 class="text-center mb-4">🚀 MEGA Remote Get</h3>
        
        <form id="downloadForm">
            <div class="input-group mb-3">
                <input type="text" id="megaLink" class="form-control form-control-lg" placeholder="https://mega.nz/..." required>
                <button class="btn btn-primary px-4" type="submit" id="submitBtn">Download</button>
            </div>
        </form>

        <hr>
        <div class="d-flex justify-content-between align-items-center">
            <h6 class="mb-0">Recent Activity</h6>
            <button class="btn btn-sm btn-outline-secondary" id="clearBtn">Clear</button>
        </div>
        <ul class="list-group history-list" id="historyList"></ul>
    </div>
</div>

<script>
    const form = document.getElementById('downloadForm');
    const input = document.getElementById('megaLink');
    const btn = document.getElementById('submitBtn');
    const historyList = document.getElementById('historyList');
    const clearBtn = document.getElementById('clearBtn');

    // Initial load
    renderHistory();

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const link = input.value.trim();
        if (!link) return;

        // Lockdown UI
        input.disabled = true;
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = '...ing'; 

        try {
            const response = await fetch('/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link })
            });
            const data = await response.json();
            
            saveToHistory({ 
                link, 
                success: data.exitCode === 0, 
                message: data.message,
                time: new Date().toLocaleTimeString() 
            });

        } catch (err) {
            saveToHistory({ link, success: false, message: "Network Error", time: "" });
        } finally {
            input.disabled = false;
            btn.disabled = false;
            btn.textContent = originalText;
            input.value = '';
            renderHistory();
        }
    });

    function saveToHistory(item) {
        const history = JSON.parse(localStorage.getItem('mega_history') || '[]');
        history.unshift(item);
        localStorage.setItem('mega_history', JSON.stringify(history.slice(0, 10)));
    }

    function renderHistory() {
        // Clear children safely
        while (historyList.firstChild) {
            historyList.removeChild(historyList.firstChild);
        }

        const history = JSON.parse(localStorage.getItem('mega_history') || '[]');
        
        history.forEach(item => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center';

            const textWrapper = document.createElement('div');
            textWrapper.className = 'text-truncate px-2';
            
            const strong = document.createElement('strong');
            strong.textContent = item.message;
            
            const br = document.createElement('br');
            
            const small = document.createElement('small');
            small.className = 'text-muted';
            small.textContent = item.link;

            textWrapper.append(strong, br, small);

            const badge = document.createElement('span');
            badge.className = `badge rounded-pill ${item.success ? 'bg-success' : 'bg-danger'}`;
            badge.textContent = item.success ? 'Started' : 'Fail';

            li.append(textWrapper, badge);
            historyList.appendChild(li);
        });
    }

    clearBtn.onclick = () => {
        localStorage.removeItem('mega_history');
        renderHistory();
    };
</script>

</body>
</html>
